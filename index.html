<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trip planners</title>
  <meta name="theme-color" content="#1e2d24">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f4f1eb;
      --ink: #1e2d24;
      --muted: #7a756c;
      --accent: #2d6a4f;
      --card: #faf8f4;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      line-height: 1.5;
    }
    h1 {
      font-family: 'Instrument Serif', Georgia, serif;
      font-weight: 400;
      font-size: clamp(2rem, 6vw, 3rem);
      margin-bottom: 0.35rem;
      text-align: center;
    }
    .sub {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 2.5rem;
      text-align: center;
    }
    .grid {
      display: grid;
      gap: 1rem;
      width: 100%;
      max-width: 420px;
    }
    a.trip {
      display: block;
      padding: 1.25rem 1.5rem;
      background: var(--card);
      border: 1px solid rgba(30, 45, 36, 0.08);
      border-radius: 14px;
      text-decoration: none;
      color: var(--ink);
      transition: box-shadow 0.2s, transform 0.2s;
    }
    a.trip:hover {
      box-shadow: 0 8px 28px rgba(30, 45, 36, 0.08);
      transform: translateY(-2px);
    }
    a.trip .name {
      font-family: 'Instrument Serif', Georgia, serif;
      font-size: 1.35rem;
      margin-bottom: 0.25rem;
    }
    a.trip .hint {
      font-size: 0.85rem;
      color: var(--muted);
    }
    a.trip .go {
      margin-top: 0.75rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
    }
    footer {
      margin-top: 3rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.08em;
    }
  </style>
</head>
<body>
  <h1>Trip planners</h1>
  <p class="sub">Shared repo · static · GitHub Pages</p>
  <nav class="grid" aria-label="Trips">
    <a class="trip" href="guatemala/">
      <div class="name">Guatemala</div>
      <div class="hint">Itinerary, packing, budget, assistant</div>
      <div class="go">Open planner →</div>
    </a>
    <a class="trip" href="woodstock/">
      <div class="name">Woodstock</div>
      <div class="hint">Catskills weekend · stays & food</div>
      <div class="go">Open planner →</div>
    </a>
  </nav>
  <footer>Deploy from <code style="font-size:0.9em">main</code> · see README</footer>
</body>
</html>
