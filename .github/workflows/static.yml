name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Inject API keys and trip passwords (per-trip apps)
        env:
          SITE_PASSWORD_GUATEMALA: ${{ secrets.SITE_PASSWORD_GUATEMALA }}
          SITE_PASSWORD_TRIP: ${{ secrets.SITE_PASSWORD_TRIP }}
          SITE_PASSWORD_WOODSTOCK: ${{ secrets.SITE_PASSWORD_WOODSTOCK }}
        run: |
          sed -i 's/__GEMINI_API_KEY__/${{ secrets.GEMINI_API_KEY }}/g' guatemala/index.html
          sed -i 's/__GEMINI_API_KEY__/${{ secrets.GEMINI_API_KEY }}/g' trip/index.html
          python3 << 'PY'
          import json, os, pathlib
          def inject(path: str, placeholder: str, env_key: str) -> None:
              p = pathlib.Path(path)
              t = p.read_text(encoding="utf-8")
              pw = os.environ.get(env_key) or ""
              blob = json.dumps({"password": pw}, ensure_ascii=False)
              if placeholder not in t:
                  raise SystemExit(f"missing {placeholder} in {path}")
              p.write_text(t.replace(placeholder, blob), encoding="utf-8")
          def trip_password() -> str:
              return (os.environ.get("SITE_PASSWORD_TRIP") or os.environ.get("SITE_PASSWORD_WOODSTOCK") or "")
          inject("guatemala/index.html", "__TRIP_PW_JSON_GUATEMALA__", "SITE_PASSWORD_GUATEMALA")
          p = pathlib.Path("trip/index.html")
          t = p.read_text(encoding="utf-8")
          blob = json.dumps({"password": trip_password()}, ensure_ascii=False)
          if "__TRIP_PW_JSON_TRIP__" not in t:
              raise SystemExit("missing __TRIP_PW_JSON_TRIP__ in trip/index.html")
          p.write_text(t.replace("__TRIP_PW_JSON_TRIP__", blob), encoding="utf-8")
          PY
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
